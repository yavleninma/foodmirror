# Nginx reverse proxy for Metabase (Option C: HTTPS access)
# 1. Copy to /etc/nginx/sites-available/ metabase
# 2. ln -s /etc/nginx/sites-available/metabase /etc/nginx/sites-enabled/
# 3. Replace analytics.example.com with your domain
# 4. Ensure Metabase listens on 127.0.0.1:3040 (METABASE_PORT in .env)
# 5. nginx -t && systemctl reload nginx
# 6. certbot --nginx -d analytics.example.com  (adds SSL)

server {
    listen 80;
    server_name analytics.example.com;

    location / {
        proxy_pass http://127.0.0.1:3040;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}
